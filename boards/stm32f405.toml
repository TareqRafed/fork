name = "stm32f405"
flash_tool = "dfu-util"

[usb]
vid = 0x0483
pid = [0xdf11]

[[build_tools]]
name = "embassy-stm32"
docker_image = "rust:latest"
build_command = ["cargo", "build", "--release", "--target", "thumbv7em-none-eabihf"]
artifact_path = "target/thumbv7em-none-eabihf/release/firmware.bin"
detect_command = "grep -q 'embassy-stm32' Cargo.toml"

[[build_tools]]
name = "stm32f4xx-hal"
docker_image = "rust:latest"
build_command = ["cargo", "build", "--release", "--target", "thumbv7em-none-eabihf"]
artifact_path = "target/thumbv7em-none-eabihf/release/firmware.bin"
detect_command = "grep -q 'stm32f4xx-hal' Cargo.toml"
