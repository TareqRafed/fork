name = "stm32f103"

[rust]
detect = [{ file = "Cargo.toml", key = "edition" }]
layer = [{ cmd = "FROM rust:${var}", var = { file = "rust-toolchain.toml", key = "channel" } }]

[rust.cargo.rustc.thumbv7mnonenabi]
detect = [{ file = ".cargo/config.toml", key = "thumbv7m-none-eabi" }]
layer = ["RUN rustup target add thumbv7m-none-eabi"]
cmd = "cargo build"

