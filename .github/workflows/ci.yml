name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libusb-1.0-0-dev pkg-config

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Rust Check
      run: cargo check

    - name: Rust Format
      run: cargo fmt -- --check

    - name: Rust Clippy
      run: cargo clippy -- -D warnings

    - name: Rust Test
      run: cargo test

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Verify Docker
      run: docker info

    - name: Run E2E tests
      env:
        FORK_E2E: "1"
        CARGO_TERM_COLOR: always
      run: cargo test --package e2e --test e2e -- --nocapture --test-threads=1
      timeout-minutes: 30

  e2e-windows:
    runs-on: windows-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Switch Docker to Linux containers
      shell: pwsh
      run: & "$env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine

    - name: Verify Docker
      run: docker info

    - name: Run E2E tests (rp2040, Windows)
      env:
        FORK_E2E: "1"
        CARGO_TERM_COLOR: always
      run: cargo test --package e2e --test e2e -- --nocapture --test-threads=1 build_rp2040_rp2040_hal
      timeout-minutes: 30
